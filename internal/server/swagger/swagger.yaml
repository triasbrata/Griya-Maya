components:
  schemas:
    domain.ArchiveFormat:
      description: Format overrides format detection when set.
      type: string
      x-enum-varnames:
      - FormatCBZ
      - FormatEPUB
      - FormatPDF
    domain.Chapter:
      properties:
        dateUpload:
          type: string
        format:
          description: |-
            Format is the stored artifact type when this chapter was ingested from an
            archive ("cbz" | "epub" | "pdf" | ""). Empty means remote-only.
          type: string
        id:
          type: string
        mediaId:
          type: string
        name:
          type: string
        number:
          type: number
        scanlator:
          type: string
        url:
          type: string
      type: object
    domain.ChapterWriteRequest:
      properties:
        dateUpload:
          type: string
        format:
          type: string
        mediaId:
          type: string
        name:
          type: string
        number:
          type: number
        scanlator:
          type: string
        url:
          type: string
      type: object
    domain.ConvertJob:
      properties:
        chapterId:
          type: string
        createdAt:
          type: string
        error:
          type: string
        format:
          description: Format overrides format detection when set.
          type: string
          x-enum-varnames:
          - FormatCBZ
          - FormatEPUB
          - FormatPDF
        id:
          type: string
        mediaId:
          type: string
        outputPrefix:
          type: string
        pageCount:
          type: integer
        sourceKey:
          type: string
        status:
          $ref: '#/components/schemas/domain.ConvertStatus'
        updatedAt:
          type: string
      type: object
    domain.ConvertRequest:
      properties:
        chapterId:
          type: string
        format:
          $ref: '#/components/schemas/domain.ArchiveFormat'
        mediaId:
          description: MediaID / ChapterID associate the produced pages with catalog
            rows.
          type: string
        outputPrefix:
          description: |-
            OutputPrefix is the R2 key prefix under which page-NNNN.avif are written.
            Defaults to "pages/<jobID>/".
          type: string
        sourceKey:
          description: SourceKey is the R2 object key of the CBZ/EPUB/PDF to convert.
          type: string
      type: object
    domain.ConvertStatus:
      type: string
      x-enum-varnames:
      - ConvertPending
      - ConvertRunning
      - ConvertDone
      - ConvertFailed
    domain.Media:
      properties:
        artists:
          items:
            type: string
          type: array
          uniqueItems: false
        authors:
          items:
            type: string
          type: array
          uniqueItems: false
        categories:
          items:
            type: string
          type: array
          uniqueItems: false
        coverUrl:
          type: string
        description:
          type: string
        genres:
          items:
            type: string
          type: array
          uniqueItems: false
        id:
          type: string
        sourceId:
          type: string
        status:
          $ref: '#/components/schemas/domain.MediaStatus'
        title:
          type: string
        type:
          $ref: '#/components/schemas/domain.MediaType'
        updatedAt:
          type: string
        url:
          type: string
      type: object
    domain.MediaPage:
      properties:
        hasNext:
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/domain.Media'
          type: array
          uniqueItems: false
        page:
          type: integer
      type: object
    domain.MediaStatus:
      type: string
      x-enum-varnames:
      - StatusUnknown
      - StatusOngoing
      - StatusCompleted
      - StatusLicensed
      - StatusHiatus
      - StatusCancelled
      - StatusPublishing
    domain.MediaType:
      type: string
      x-enum-varnames:
      - MediaManga
      - MediaVideo
      - MediaNovel
    domain.MediaWriteRequest:
      properties:
        artists:
          items:
            type: string
          type: array
          uniqueItems: false
        authors:
          items:
            type: string
          type: array
          uniqueItems: false
        categories:
          items:
            type: string
          type: array
          uniqueItems: false
        coverUrl:
          type: string
        description:
          type: string
        genres:
          items:
            type: string
          type: array
          uniqueItems: false
        sourceId:
          type: string
        status:
          type: string
          x-enum-varnames:
          - StatusUnknown
          - StatusOngoing
          - StatusCompleted
          - StatusLicensed
          - StatusHiatus
          - StatusCancelled
          - StatusPublishing
        title:
          type: string
        type:
          type: string
          x-enum-varnames:
          - MediaManga
          - MediaVideo
          - MediaNovel
        url:
          type: string
      type: object
    domain.NovelRegisterRequest:
      properties:
        chapterId:
          description: ChapterID is the catalog chapter these pages belong to (required).
          type: string
        text:
          description: |-
            Text is the inline chapter text. When set, the server stores it as a `.txt`
            object in R2 and uses that key. Ignored when TextKey is set.
          type: string
        textKey:
          description: |-
            TextKey is the R2 object key of an already-uploaded `.txt` (alternative to
            Text). One of Text or TextKey is required.
          type: string
      type: object
    domain.Page:
      properties:
        body:
          type: string
        height:
          type: integer
        imageUrl:
          type: string
        index:
          type: integer
        type:
          type: string
        width:
          type: integer
      type: object
    domain.Taxonomy:
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
      type: object
    domain.TaxonomyWriteRequest:
      properties:
        name:
          type: string
      type: object
    domain.VideoRegisterRequest:
      properties:
        chapterId:
          description: ChapterID is the catalog chapter these pages belong to (required).
          type: string
        height:
          type: integer
        playlistKey:
          description: PlaylistKey is the R2 object key of the HLS `.m3u8` playlist
            (required).
          type: string
        width:
          description: Width / Height are the video's pixel dimensions (optional,
            informational).
          type: integer
      type: object
    handler.ErrorResponse:
      properties:
        error:
          type: string
        message:
          type: string
      type: object
    handler.UploadResponse:
      properties:
        sourceKey:
          type: string
      type: object
    handler.VideoUploadResponse:
      properties:
        keys:
          items:
            type: string
          type: array
          uniqueItems: false
        playlistKey:
          type: string
        prefix:
          type: string
      type: object
    oidc.clientMetadata:
      properties:
        application_type:
          type: string
        client_name:
          type: string
        grant_types:
          items:
            type: string
          type: array
          uniqueItems: false
        post_logout_redirect_uris:
          items:
            type: string
          type: array
          uniqueItems: false
        redirect_uris:
          items:
            type: string
          type: array
          uniqueItems: false
        response_types:
          items:
            type: string
          type: array
          uniqueItems: false
        scope:
          type: string
        token_endpoint_auth_method:
          type: string
      type: object
    oidc.dcrErrorResponse:
      properties:
        error:
          type: string
        error_description:
          type: string
      type: object
    oidc.registrationResponse:
      properties:
        application_type:
          type: string
        client_id:
          type: string
        client_id_issued_at:
          type: integer
        client_name:
          type: string
        client_secret:
          type: string
        client_secret_expires_at:
          type: integer
        grant_types:
          items:
            type: string
          type: array
          uniqueItems: false
        redirect_uris:
          items:
            type: string
          type: array
          uniqueItems: false
        registration_access_token:
          type: string
        registration_client_uri:
          type: string
        response_types:
          items:
            type: string
          type: array
          uniqueItems: false
        scope:
          type: string
        token_endpoint_auth_method:
          type: string
      type: object
    service.ConvertResult:
      properties:
        job:
          $ref: '#/components/schemas/domain.ConvertJob'
        pages:
          items:
            $ref: '#/components/schemas/domain.Page'
          type: array
          uniqueItems: false
      type: object
  securitySchemes:
    BearerAuth:
      description: RFC 7592 registration_access_token. Use "Bearer <token>".
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  description: Manga catalog + reader API that mirrors the Mihon iOS SourceRuntime
    contract, plus CBZ/EPUB/PDF -> AVIF conversion backed by Cloudflare R2/D1. Write
    endpoints are protected by an embedded OpenID Provider; clients onboard via OAuth2
    Dynamic Client Registration (RFC 7591/7592).
  title: Mihon Manga Server
  version: 0.1.0
openapi: 3.1.0
paths:
  /connect/register:
    post:
      description: Dynamic Client Registration. Unauthenticated. Returns the new client_id
        plus a registration_access_token used to manage the client via RFC 7592. A
        client_secret is issued unless token_endpoint_auth_method is "none".
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/oidc.clientMetadata'
        description: Client metadata
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oidc.registrationResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oidc.dcrErrorResponse'
          description: Bad Request
      summary: Register an OAuth2 client (RFC 7591)
      tags:
      - oauth
  /connect/register/{id}:
    delete:
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          description: Deleted
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oidc.dcrErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oidc.dcrErrorResponse'
          description: Not Found
      security:
      - RegistrationToken: []
      summary: Delete a client's registration (RFC 7592)
      tags:
      - oauth
    get:
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oidc.registrationResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oidc.dcrErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oidc.dcrErrorResponse'
          description: Not Found
      security:
      - RegistrationToken: []
      summary: Read a client's registration (RFC 7592)
      tags:
      - oauth
    put:
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/oidc.clientMetadata'
        description: Updated client metadata
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oidc.registrationResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oidc.dcrErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oidc.dcrErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oidc.dcrErrorResponse'
          description: Not Found
      security:
      - RegistrationToken: []
      summary: Update a client's registration (RFC 7592)
      tags:
      - oauth
  /healthz:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: OK
      summary: Liveness probe
      tags:
      - system
  /v1/chapters/{id}:
    delete:
      parameters:
      - description: Chapter ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
      security:
      - BearerAuth: []
      summary: Delete a chapter (and its pages).
      tags:
      - media
    put:
      parameters:
      - description: Chapter ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/domain.ChapterWriteRequest'
        description: Chapter
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Chapter'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
      security:
      - BearerAuth: []
      summary: Update a chapter.
      tags:
      - media
  /v1/chapters/{id}/pages:
    get:
      description: Returns short-lived presigned R2 URLs the client fetches directly.
        Requires a manga.read access token.
      parameters:
      - description: Chapter ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/domain.Page'
                type: array
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Forbidden
      security:
      - BearerAuth: []
      summary: Page list (presigned URLs) for a chapter
      tags:
      - reader
  /v1/convert:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/domain.ConvertRequest'
        description: Conversion request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/service.ConvertResult'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
        "415":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unsupported Media Type
      security:
      - BearerAuth: []
      summary: Convert an archive already in R2 into AVIF pages (stored in R2).
      tags:
      - convert
  /v1/convert/jobs/{id}:
    get:
      parameters:
      - description: Job ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.ConvertJob'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Not Found
      security:
      - BearerAuth: []
      summary: Get a conversion job's status.
      tags:
      - convert
  /v1/convert/upload:
    post:
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: string
        description: Target R2 key (defaults to uploads/{uuid})
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.UploadResponse'
          description: Created
      security:
      - BearerAuth: []
      summary: Upload a CBZ/EPUB/PDF archive into R2 (multipart field "file").
      tags:
      - convert
  /v1/image:
    get:
      description: Legacy proxy kept behind the manga.read gate so the bucket stays
        private. Prefer the presigned URLs from /v1/chapters/{id}/pages.
      parameters:
      - description: R2 object key
        in: query
        name: key
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: file
            image/avif:
              schema:
                type: string
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Unauthorized
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Forbidden
      security:
      - BearerAuth: []
      summary: Proxy an AVIF page object from R2 (retired; gated fallback).
      tags:
      - reader
  /v1/media:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/domain.MediaWriteRequest'
        description: Media
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Media'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
      security:
      - BearerAuth: []
      summary: Create a media entry (manga | video | novel).
      tags:
      - media
  /v1/media/{id}:
    delete:
      parameters:
      - description: Media ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
      security:
      - BearerAuth: []
      summary: Delete a media entry (cascades chapters/pages/links).
      tags:
      - media
    get:
      parameters:
      - description: Media ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Media'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Not Found
      summary: Media details
      tags:
      - catalog
    put:
      parameters:
      - description: Media ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/domain.MediaWriteRequest'
        description: Media
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Media'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
      security:
      - BearerAuth: []
      summary: Update a media entry.
      tags:
      - media
  /v1/media/{id}/chapters:
    get:
      parameters:
      - description: Media ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/domain.Chapter'
                type: array
          description: OK
      summary: Chapter list for a media entry
      tags:
      - catalog
    post:
      parameters:
      - description: Media ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/domain.ChapterWriteRequest'
        description: Chapter
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Chapter'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
      security:
      - BearerAuth: []
      summary: Create a chapter under a media entry.
      tags:
      - media
  /v1/novel:
    post:
      description: Provide inline `text` (the server stores it as a .txt in R2) or
        `textKey` of an already-uploaded object. The chapter then serves as a single
        novel page whose `body` carries the text.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/domain.NovelRegisterRequest'
        description: Novel registration
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.Page'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/handler.ErrorResponse'
          description: Bad Request
      security:
      - BearerAuth: []
      summary: Register a text chapter (stored as .txt in R2) as a chapter's novel
        page.
      tags:
      - novel
  /v1/sources/{sourceId}/categories:
    get:
      parameters:
      - description: Source ID
        in: path
        name: sourceId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/domain.Taxonomy'
                type: array
          description: OK
      summary: Filterable categories for a source
      tags:
      - catalog
  /v1/sources/{sourceId}/genres:
    get:
      parameters:
      - description: Source ID
        in: path
        name: sourceId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/domain.Taxonomy'
                type: array
          description: OK
      summary: Filterable genres for a source
      tags:
      - catalog
  /v1/sources/{sourceId}/latest:
    get:
      parameters:
      - description: Source ID
        in: path
        name: sourceId
        required: true
        schema:
          type: string
      - description: Page (1-based)
        in: query
        name: page
        schema:
          type: integer
      - description: Sort key
        in: query
        name: sort
        schema:
          enum:
          - popular
          - latest
          - updated
          - rating
          - title
          type: string
      - description: Sort direction
        in: query
        name: order
        schema:
          enum:
          - asc
          - desc
          type: string
      - description: 'Media type (repeatable): manga|video|novel'
        in: query
        name: type
        schema:
          items:
            type: string
          type: array
      - description: Include genre slug (repeatable)
        in: query
        name: genre
        schema:
          items:
            type: string
          type: array
      - description: Exclude genre slug (repeatable)
        in: query
        name: genreExclude
        schema:
          items:
            type: string
          type: array
      - description: Include category slug (repeatable)
        in: query
        name: category
        schema:
          items:
            type: string
          type: array
      - description: Exclude category slug (repeatable)
        in: query
        name: categoryExclude
        schema:
          items:
            type: string
          type: array
      - description: Combine included genres/categories
        in: query
        name: genreMode
        schema:
          enum:
          - or
          - and
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/domain.MediaPage'
          description: OK
      summary: Latest-updated media for a source
      tags:
      - catalog
  /v1/sources/{sourceId}/popular:
    get:
      parameters:
      - description: Source ID
        in: path
        name: sourceId
        required: true
        schema:
          type: string
      - description: Page (1-based)
        in: query
        name: page
        schema:
          type: integer
      - description: Sort key
        in: query
        name: sort
        schema:
          enum:
          - popular
          - latest
          - updated
          - rating
          - title
          type: string
      - description: Sort direction
        in: query
        name: order
        schema:
          enum:
          - asc
          - desc
